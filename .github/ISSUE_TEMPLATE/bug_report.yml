name: Bug Report
description: Report a problem with the Grape Expectations plugin
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug! The more detail you give, the faster it can be fixed.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched existing issues and this isn't a duplicate.
          required: true
        - label: I'm on the latest version of the plugin and RuneLite.
          required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can the problem be triggered?
      placeholder: |
        1. Start fermenting wine with '...'
        2. Watch row '...'
        3. See the wrong value
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Which part of the plugin is affected? (Select all that apply.)
      multiple: true
      options:
        - Row 1 – inventory counts (grapes / jug of water / fermenting wine)
        - Row 2 – banked XP estimate
        - Row 3 – level progress projection
        - Row 4 – fermentation countdown timer
        - Fail-chance / XP model
        - Overlay rendering / position
        - Configuration / settings
        - Other
    validations:
      required: true

  - type: input
    id: cooking-level
    attributes:
      label: Cooking level
      description: Your Cooking level when the bug occurred (fail chance and projections depend on it).
      placeholder: "e.g. 52"

  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: "0.1"
    validations:
      required: true

  - type: input
    id: runelite-version
    attributes:
      label: RuneLite version
      description: Configuration > About, or shown by the launcher.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11 / macOS 14 / Linux"
    validations:
      required: true

  - type: dropdown
    id: game-mode
    attributes:
      label: Game mode
      options:
        - Fixed
        - Resizable classic
        - Resizable modern

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: >
        From `~/.runelite/logs/client.log`
        (Windows: `%USERPROFILE%\.runelite\logs\client.log`).
        Please remove any account or personal information first.
      render: text

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots of the overlay or config.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: >
        Anything else that helps — does it happen every time, only after a
        certain action, or did it start after an update?
